<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>同窗时光 · 电子同学录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e6edf4 100%);
            min-height: 100vh;
            padding: 1rem;
        }

        /* 通用容器 */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* 登录/注册卡片 */
        .auth-wrapper {
            min-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .auth-card h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #1e293b;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            font-size: 1rem;
            background: #fefefe;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px #3b82f620;
        }
        .btn {
            background: #1e293b;
            border: none;
            border-radius: 2rem;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            color: white;
            margin-top: 0.5rem;
        }
        .btn-primary {
            background: #3b82f6;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-outline {
            background: transparent;
            border: 1px solid #94a3b8;
            color: #334155;
        }
        .switch-link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #3b82f6;
            cursor: pointer;
        }
        .error-msg {
            color: #dc2626;
            font-size: 0.75rem;
            margin-top: 0.3rem;
            padding-left: 1rem;
        }

        /* 主站布局 (登录后可见) */
        .main-app {
            display: none;
        }
        /* 顶部栏 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 3rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .welcome-text {
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #2b5876, #4e4376);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .avatar-btn {
            background: #e2e8f0;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.1s;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        /* 我的侧边抽屉 */
        .drawer {
            position: fixed;
            top: 0;
            right: -380px;
            width: 100%;
            max-width: 360px;
            height: 100%;
            background: white;
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 1.5rem;
            overflow-y: auto;
            border-radius: 1.5rem 0 0 1.5rem;
        }
        .drawer.open {
            right: 0;
        }
        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 1.4rem;
            font-weight: bold;
        }
        .close-drawer {
            font-size: 1.8rem;
            cursor: pointer;
        }
        .drawer-section {
            margin-bottom: 1.8rem;
        }
        .drawer-section h4 {
            border-left: 4px solid #3b82f6;
            padding-left: 0.7rem;
            margin-bottom: 0.8rem;
        }
        .user-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 0.6rem 0.8rem;
            border-radius: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .ban-badge {
            font-size: 0.7rem;
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 30px;
            padding: 0.2rem 0.5rem;
        }
        button.small {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            width: auto;
            margin: 0;
        }
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        .classmates-section, .updates-section {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 1.8rem;
            padding: 1.2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 260px;
        }
        .students-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.8rem;
            max-height: 450px;
            overflow-y: auto;
        }
        .student-card, .message-item {
            background: white;
            border-radius: 1.2rem;
            padding: 0.8rem;
            margin-bottom: 0.6rem;
        }
        .admin-actions button, .msg-actions button {
            background: transparent;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 0.3rem;
        }
        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.7rem;
            color: #4b5563;
        }
        @media (max-width: 700px) {
            .dashboard { flex-direction: column; }
        }
    </style>
</head>
<body>
<div id="authContainer" class="auth-wrapper">
    <!-- 登录注册动态渲染 -->
</div>

<div id="mainApp" class="main-app">
    <div class="container">
        <div class="top-bar">
            <div class="welcome-text" id="welcomeMsg">🌿 同窗时光，友谊长存</div>
            <div class="avatar-btn" id="avatarBtn">👤</div>
        </div>
        <div class="dashboard">
            <div class="classmates-section">
                <h3>📖 同窗名录 <span id="studentCount">0</span></h3>
                <div id="studentsList" class="students-grid">加载中...</div>
                <div style="margin-top:1rem">
                    <input type="text" id="newStudentName" placeholder="姓名" style="width:100%;margin-bottom:6px;">
                    <input type="text" id="newStudentClass" placeholder="班级/昵称">
                    <textarea id="newStudentBio" placeholder="简介" rows="1"></textarea>
                    <button id="addStudentBtn" class="btn btn-primary" style="margin-top:6px;">➕ 添加同学</button>
                    <p style="font-size:0.7rem; margin-top:4px;">管理员可编辑/删除任何同学</p>
                </div>
            </div>
            <div class="updates-section">
                <h3>💬 留言板 <span id="msgCount">0</span></h3>
                <div id="messagesList" style="max-height: 380px; overflow-y: auto;"></div>
                <div style="margin-top:1rem">
                    <input type="text" id="msgAuthor" placeholder="你的昵称">
                    <textarea id="msgContent" placeholder="写下一段祝福..." rows="2"></textarea>
                    <button id="sendMsgBtn" class="btn btn-primary">✨ 发送留言</button>
                    <p style="font-size:0.7rem;">✏️ 可编辑/删除自己的留言，管理员可管理全部</p>
                </div>
            </div>
        </div>
        <footer>⭐ 同学录 · 与青春同在</footer>
    </div>
</div>

<!-- 我的抽屉面板 -->
<div id="drawer" class="drawer">
    <div class="drawer-header">
        <span>👤 我的空间</span>
        <span class="close-drawer" id="closeDrawerBtn">&times;</span>
    </div>
    <div id="drawerContent"></div>
    <button id="logoutBtn" class="btn btn-outline" style="margin-top:1rem;">🚪 退出登录</button>
</div>

<script>
    // ---------- 存储 KEY ----------
    const STORAGE_USERS = 'classmates_users_db';
    const STORAGE_CURRENT_USER = 'classmates_current_user';
    const STORAGE_STUDENTS = 'classmates_students_data';
    const STORAGE_MESSAGES = 'classmates_messages_data';
    // 特殊超级管理员标识: "随"
    const SUPER_ACCOUNT = { username: "随", password: "sui123", phone: "admin_sui", role: "super" };

    // 初始化用户库
    let users = [];
    let currentUser = null;
    let students = [];
    let messages = [];

    // 辅助函数
    function saveUsers() { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function saveCurrentUser() { if(currentUser) localStorage.setItem(STORAGE_CURRENT_USER, JSON.stringify({ id: currentUser.id, username: currentUser.username, role: currentUser.role, phone: currentUser.phone, banExpire: currentUser.banExpire })); else localStorage.removeItem(STORAGE_CURRENT_USER); }
    function loadCurrentUser() {
        const raw = localStorage.getItem(STORAGE_CURRENT_USER);
        if(raw) {
            try {
                const saved = JSON.parse(raw);
                const fullUser = users.find(u => u.id === saved.id);
                if(fullUser) currentUser = fullUser;
                else currentUser = null;
            } catch(e){ currentUser = null; }
        } else currentUser = null;
    }

    function loadUsers() {
        const stored = localStorage.getItem(STORAGE_USERS);
        if(stored) {
            try { users = JSON.parse(stored); } catch(e){ users = []; }
        } else users = [];
        // 确保超级管理员存在
        if(!users.find(u => u.username === "随")) {
            const superUser = { id: "sui_master_id", username: "随", password: "sui123", phone: "admin_sui", role: "super", banExpire: null, createdAt: Date.now() };
            users.push(superUser);
            saveUsers();
        }
    }

    function loadStudents() {
        const stored = localStorage.getItem(STORAGE_STUDENTS);
        if(stored) { try { students = JSON.parse(stored); } catch(e){ students = []; } }
        else students = [{ id: "s1", name: "林青璇", className: "高三(1)班", bio: "永远向阳" },{ id: "s2", name: "陆一鸣", className: "高三(2)班", bio: "热爱足球" }];
        saveStudents();
    }
    function saveStudents() { localStorage.setItem(STORAGE_STUDENTS, JSON.stringify(students)); }
    function loadMessages() {
        const stored = localStorage.getItem(STORAGE_MESSAGES);
        if(stored) { try { messages = JSON.parse(stored); } catch(e){ messages = []; } }
        else messages = [{ id: "m1", author: "随", content: "祝大家前程似锦", timestamp: Date.now(), userId: "sui_master_id" }];
        saveMessages();
    }
    function saveMessages() { localStorage.setItem(STORAGE_MESSAGES, JSON.stringify(messages)); }

    // 权限辅助
    function isSuper() { return currentUser && currentUser.role === "super"; }
    function isAdmin() { return currentUser && (currentUser.role === "admin" || currentUser.role === "super"); }
    function isBanned() { return currentUser && currentUser.banExpire && currentUser.banExpire > Date.now(); }
    function getRemainingBan() { if(!currentUser?.banExpire) return 0; return Math.max(0, currentUser.banExpire - Date.now()); }

    // 渲染主界面
    function renderStudentsList() {
        const container = document.getElementById('studentsList');
        if(!container) return;
        if(!students.length) { container.innerHTML = '<div>暂无同学，管理员可添加</div>'; document.getElementById('studentCount').innerText = '0'; return; }
        const canEdit = isAdmin();
        let html = '';
        students.forEach(s => {
            html += `<div class="student-card">
                        <div><strong>${escapeHtml(s.name)}</strong> ${s.className ? `(${escapeHtml(s.className)})` : ''}</div>
                        <div style="font-size:0.75rem;">${escapeHtml(s.bio||'')}</div>
                        ${canEdit ? `<div style="margin-top:4px;"><button class="editStudentBtn" data-id="${s.id}">✏️编辑</button> <button class="delStudentBtn" data-id="${s.id}">🗑️删除</button></div>` : ''}
                    </div>`;
        });
        container.innerHTML = html;
        document.getElementById('studentCount').innerText = students.length;
        if(canEdit) {
            document.querySelectorAll('.editStudentBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); editStudentById(id); }));
            document.querySelectorAll('.delStudentBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); if(confirm('删除同学？')) deleteStudentById(id); }));
        }
    }
    function editStudentById(id) {
        let s = students.find(s=>s.id===id);
        if(!s) return;
        let newName = prompt("新姓名", s.name);
        if(newName) s.name = newName;
        let newClass = prompt("班级", s.className||"");
        if(newClass!==null) s.className = newClass;
        let newBio = prompt("简介", s.bio||"");
        if(newBio!==null) s.bio = newBio;
        saveStudents(); renderStudentsList();
    }
    function deleteStudentById(id) { students = students.filter(s=>s.id!==id); saveStudents(); renderStudentsList(); }

    function renderMessages() {
        const container = document.getElementById('messagesList');
        if(!container) return;
        if(!messages.length) { container.innerHTML = '<div>暂无留言，写下一句祝福吧</div>'; document.getElementById('msgCount').innerText = '0'; return; }
        const sorted = [...messages].sort((a,b)=> (b.timestamp||0)-(a.timestamp||0));
        let html = '';
        sorted.forEach(msg => {
            const isOwner = currentUser && msg.userId === currentUser.id;
            const canModify = isAdmin() || isOwner;
            html += `<div class="message-item">
                        <div><strong>${escapeHtml(msg.author)}</strong> <span style="font-size:0.7rem;">${formatTime(msg.timestamp)}</span></div>
                        <div>${escapeHtml(msg.content)}</div>
                        ${canModify ? `<div style="margin-top:4px;"><button class="editMsgBtn" data-id="${msg.id}">编辑</button> <button class="delMsgBtn" data-id="${msg.id}">删除</button></div>` : ''}
                    </div>`;
        });
        container.innerHTML = html;
        document.getElementById('msgCount').innerText = messages.length;
        document.querySelectorAll('.editMsgBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); editMsgById(id); }));
        document.querySelectorAll('.delMsgBtn').forEach(btn => btn.addEventListener('click', (e) => { const id = btn.getAttribute('data-id'); deleteMsgById(id); }));
    }
    function editMsgById(id) {
        let msg = messages.find(m=>m.id===id);
        if(!msg) return;
        if(!isAdmin() && msg.userId !== currentUser.id) { alert("无权编辑"); return; }
        let newContent = prompt("编辑留言", msg.content);
        if(newContent && newContent.trim()) { msg.content = newContent.trim(); msg.timestamp = Date.now(); saveMessages(); renderMessages(); }
    }
    function deleteMsgById(id) {
        let msg = messages.find(m=>m.id===id);
        if(!msg) return;
        if(!isAdmin() && msg.userId !== currentUser.id) { alert("无权删除"); return; }
        messages = messages.filter(m=>m.id!==id);
        saveMessages(); renderMessages();
    }

    function addStudent(name, className, bio) {
        if(!isAdmin()) { alert("只有管理员可以添加同学"); return false; }
        if(!name.trim()) return false;
        students.push({ id: Date.now()+"_"+Math.random(), name: name.trim(), className: className.trim(), bio: bio.trim() });
        saveStudents(); renderStudentsList(); return true;
    }
    function addMessage(author, content) {
        if(isBanned()) { alert(`您已被禁言，剩余${Math.ceil(getRemainingBan()/86400000)}天`); return false; }
        if(!author.trim() || !content.trim()) { alert("请填写昵称和内容"); return false; }
        messages.push({ id: Date.now()+"_"+Math.random(), author: author.trim(), content: content.trim(), timestamp: Date.now(), userId: currentUser.id });
        saveMessages(); renderMessages(); return true;
    }

    // 管理功能: 警告, 禁言
    function warnUser(targetUserId, reason) {
        if(!isAdmin()) return;
        let user = users.find(u=>u.id===targetUserId);
        if(!user) return;
        alert(`已警告用户 ${user.username}`);
        // 记录警告(简化: 可直接在localStorage记录警告次数，便于二次惩罚)
        let warns = JSON.parse(localStorage.getItem("user_warns")||"{}");
        warns[targetUserId] = (warns[targetUserId]||0)+1;
        localStorage.setItem("user_warns", JSON.stringify(warns));
        if(warns[targetUserId] >= 2) {
            if(confirm("该用户已累计两次警告，是否禁言三天？")) banUserById(targetUserId, 3, "多次警告");
        }
        renderDrawer();
    }
    function banUserById(targetUserId, days, reason) {
        if(!isAdmin()) return;
        let user = users.find(u=>u.id===targetUserId);
        if(!user || user.role === "super") { alert("无法处罚超级管理员"); return; }
        let expire = Date.now() + days * 86400000;
        user.banExpire = expire;
        saveUsers();
        if(currentUser && currentUser.id === targetUserId) { alert("你已被禁言"); loadCurrentUser(); if(currentUser) currentUser.banExpire = expire; saveCurrentUser(); }
        renderDrawer();
        alert(`已禁言用户 ${user.username} ${days}天`);
    }
    function unbanUser(targetUserId) {
        if(!isAdmin()) return;
        let user = users.find(u=>u.id===targetUserId);
        if(user) { user.banExpire = null; saveUsers(); if(currentUser?.id===targetUserId) { if(currentUser) currentUser.banExpire=null; saveCurrentUser(); } renderDrawer(); alert("已解除禁言"); }
    }

    // 管理员管理页面 (显示在抽屉)
    function renderDrawer() {
        if(!currentUser) return;
        const container = document.getElementById('drawerContent');
        if(!container) return;
        let isSup = isSuper();
        let isAdm = isAdmin();
        let html = `<div class="drawer-section"><h4>👤 ${currentUser.username}</h4><p>角色: ${currentUser.role === 'super' ? '超级管理员(随)' : (currentUser.role==='admin'?'管理员':'普通成员')}</p>${isBanned()? `<p style="color:red">⛔ 禁言中，剩余${Math.ceil(getRemainingBan()/86400000)}天</p>`:''}</div>`;
        if(isAdm) {
            html += `<div class="drawer-section"><h4>⚙️ 管理面板</h4><button id="addAdminBtn" class="btn btn-outline small">➕ 添加管理员（输入用户名）</button>
                     <button id="removeAdminBtn" class="btn btn-outline small" style="margin-top:5px;">🗑️ 移除管理员</button>
                     <hr style="margin:8px 0;"><h4>👥 所有用户</h4><div id="userManageList"></div></div>`;
        }
        container.innerHTML = html;
        if(isAdm) {
            renderUserManagement();
            document.getElementById('addAdminBtn')?.addEventListener('click', ()=>{
                let uname = prompt("输入要添加为管理员的用户名");
                if(uname) {
                    let target = users.find(u=>u.username===uname);
                    if(target && target.role !== 'super') { target.role = 'admin'; saveUsers(); renderDrawer(); alert("已设为管理员"); }
                    else alert("用户不存在或无法升级");
                }
            });
            document.getElementById('removeAdminBtn')?.addEventListener('click', ()=>{
                let uname = prompt("输入要移除管理员的用户名");
                if(uname) {
                    let target = users.find(u=>u.username===uname);
                    if(target && target.role === 'admin') { target.role = 'member'; saveUsers(); renderDrawer(); alert("已移除管理员权限"); }
                    else alert("不是管理员");
                }
            });
        }
    }
    function renderUserManagement() {
        const userDiv = document.getElementById('userManageList');
        if(!userDiv) return;
        let html = '';
        users.forEach(u => {
            let isB = u.banExpire && u.banExpire > Date.now();
            html += `<div class="user-list-item"><span>${escapeHtml(u.username)} (${u.role}) ${isB ? '<span class="ban-badge">禁言中</span>' : ''}</span>
                    <div><button class="warnUserBtn" data-id="${u.id}">⚠️警告</button>
                    ${isB ? `<button class="unbanBtn" data-id="${u.id}">🔓解禁</button>` : `<button class="ban3Btn" data-id="${u.id}">🚫禁言3天</button><button class="ban7Btn" data-id="${u.id}">🚫禁言7天</button><button class="banYearBtn" data-id="${u.id}">🚫禁言1年</button>`}
                    </div></div>`;
        });
        userDiv.innerHTML = html;
        document.querySelectorAll('.warnUserBtn').forEach(btn=>btn.addEventListener('click',()=>warnUser(btn.getAttribute('data-id'),"管理警告")));
        document.querySelectorAll('.ban3Btn').forEach(btn=>btn.addEventListener('click',()=>banUserById(btn.getAttribute('data-id'),3,"管理员处罚")));
        document.querySelectorAll('.ban7Btn').forEach(btn=>btn.addEventListener('click',()=>banUserById(btn.getAttribute('data-id'),7,"管理员处罚")));
        document.querySelectorAll('.banYearBtn').forEach(btn=>btn.addEventListener('click',()=>banUserById(btn.getAttribute('data-id'),365,"严重违规")));
        document.querySelectorAll('.unbanBtn').forEach(btn=>btn.addEventListener('click',()=>unbanUser(btn.getAttribute('data-id'))));
    }

    function refreshUI() { if(currentUser) { renderStudentsList(); renderMessages(); document.getElementById('welcomeMsg').innerHTML = `✨ 欢迎回来，${currentUser.username} · 同窗依旧`; } }

    // 登录注册界面
    function showAuth() {
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        renderAuthForm('login');
    }
    function renderAuthForm(mode) {
        const container = document.getElementById('authContainer');
        const isLogin = mode === 'login';
        container.innerHTML = `
            <div class="auth-card">
                <h2>${isLogin ? '登录同学录' : '注册新账号'}</h2>
                <div class="input-group"><input id="authUsername" placeholder="用户名" /></div>
                ${!isLogin ? `<div class="input-group"><input id="authPhone" placeholder="手机号(唯一标识)" /></div>` : ''}
                <div class="input-group"><input id="authPassword" type="password" placeholder="密码" /></div>
                ${!isLogin ? `<div class="input-group"><input id="authConfirmPwd" type="password" placeholder="确认密码" /></div>` : ''}
                <button id="submitAuthBtn" class="btn btn-primary">${isLogin ? '登录' : '注册'}</button>
                <div class="switch-link" id="switchModeBtn">${isLogin ? '没有账号？立即注册' : '已有账号？去登录'}</div>
                ${isLogin ? `<div class="switch-link" id="forgotPwdBtn" style="color:#f97316;">❓ 忘记密码 (通过用户名+手机号重设)</div>` : ''}
                <div id="authError" class="error-msg"></div>
            </div>
        `;
        document.getElementById('submitAuthBtn').addEventListener('click', () => {
            if(isLogin) handleLogin(); else handleRegister();
        });
        document.getElementById('switchModeBtn').addEventListener('click', () => renderAuthForm(isLogin ? 'register' : 'login'));
        if(!isLogin) return;
        const forgotBtn = document.getElementById('forgotPwdBtn');
        if(forgotBtn) forgotBtn.addEventListener('click', handleForgotPassword);
    }
    function handleLogin() {
        let username = document.getElementById('authUsername').value.trim();
        let pwd = document.getElementById('authPassword').value;
        let user = users.find(u=>u.username===username && u.password===pwd);
        if(!user) { document.getElementById('authError').innerText = '用户名或密码错误'; return; }
        currentUser = user;
        saveCurrentUser();
        afterLoginSuccess();
    }
    function handleRegister() {
        let username = document.getElementById('authUsername').value.trim();
        let phone = document.getElementById('authPhone').value.trim();
        let pwd = document.getElementById('authPassword').value;
        let confirm = document.getElementById('authConfirmPwd').value;
        if(!username || !phone || !pwd) { document.getElementById('authError').innerText = '请填写完整信息'; return; }
        if(pwd !== confirm) { document.getElementById('authError').innerText = '两次密码不一致'; return; }
        if(users.find(u=>u.username===username)) { document.getElementById('authError').innerText = '用户名已存在'; return; }
        if(users.find(u=>u.phone===phone)) { document.getElementById('authError').innerText = '手机号已被注册'; return; }
        let newUser = { id: Date.now()+"_"+Math.random(), username, phone, password: pwd, role: "member", banExpire: null, createdAt: Date.now() };
        users.push(newUser);
        saveUsers();
        alert('注册成功，请登录');
        renderAuthForm('login');
    }
    function handleForgotPassword() {
        let username = prompt("请输入用户名");
        let phone = prompt("请输入注册手机号");
        let user = users.find(u=>u.username===username && u.phone===phone);
        if(!user) { alert("用户名与手机号不匹配"); return; }
        let newPwd = prompt("请输入新密码");
        let confirmPwd = prompt("再次确认新密码");
        if(newPwd && newPwd === confirmPwd) { user.password = newPwd; saveUsers(); alert("密码已重置，请登录"); renderAuthForm('login'); }
        else alert("密码不一致");
    }
    function afterLoginSuccess() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        refreshUI();
        renderDrawer();
    }

    function logout() { currentUser = null; saveCurrentUser(); showAuth(); }

    // 事件绑定
    document.getElementById('avatarBtn')?.addEventListener('click', ()=> document.getElementById('drawer').classList.add('open'));
    document.getElementById('closeDrawerBtn')?.addEventListener('click', ()=> document.getElementById('drawer').classList.remove('open'));
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.getElementById('addStudentBtn')?.addEventListener('click', ()=>{
        let name = document.getElementById('newStudentName').value;
        let cls = document.getElementById('newStudentClass').value;
        let bio = document.getElementById('newStudentBio').value;
        if(addStudent(name, cls, bio)) { document.getElementById('newStudentName').value=''; document.getElementById('newStudentClass').value=''; document.getElementById('newStudentBio').value=''; }
    });
    document.getElementById('sendMsgBtn')?.addEventListener('click', ()=>{
        let author = document.getElementById('msgAuthor').value;
        let content = document.getElementById('msgContent').value;
        if(addMessage(author, content)) { document.getElementById('msgContent').value=''; renderMessages(); }
    });

    // 启动
    loadUsers();
    loadCurrentUser();
    loadStudents();
    loadMessages();
    if(currentUser) afterLoginSuccess(); else showAuth();

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatTime(ts) { if(!ts) return '刚刚'; let diff = Date.now()-ts; if(diff<60000) return '刚刚'; if(diff<3600000) return Math.floor(diff/60000)+'分钟前'; if(diff<86400000) return Math.floor(diff/3600000)+'小时前'; return new Date(ts).toLocaleDateString(); }
</script>
</body>
</html>
